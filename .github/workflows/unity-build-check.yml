name: Unity Build Check (Windows & Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.targetPlatform }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            targetPlatform: StandaloneWindows64
          - os: ubuntu-latest
            targetPlatform: StandaloneLinux64
    steps:
      - name: Log start info
        run: |
          echo "Starting build process..."
          echo "Runner OS: ${{ matrix.os }}"
          echo "Target platform: ${{ matrix.targetPlatform }}"
          echo "Unity version: 6000.3.11f1"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Log checkout success
        run: echo "Repository code checked out successfully."

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-
      - name: Log cache status
        run: echo "Library cache check completed."

      - name: Install Unity Editor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Устанавливаем Unity Hub
          $hubUrl = "https://public-cdn.cloud.unity3d.com/hub/prod/UnityHubSetup.exe"
          Invoke-WebRequest -Uri $hubUrl -OutFile "UnityHubSetup.exe"
          Start-Process -FilePath "UnityHubSetup.exe" -ArgumentList "/S" -Wait

          # Устанавливаем Unity Editor через командную строку Unity Hub
          $unityVersion = "6000.3.11f1"
          & "C:\Program Files\Unity Hub\Unity Hub.exe" -- --headless install --version $unityVersion --module windows-il2cpp
        continue-on-error: true

      - name: Install Unity Editor (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          # Для Ubuntu используем GameCI builder напрямую
          echo "Using GameCI builder for Linux..."
          # Устанавливаем зависимости
          sudo apt-get update
          sudo apt-get install -y libasound2 libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgcc1 libgconf-2-4 libgdk-pixbuf2.0-0 libgl1 libglib2.0-0 libgtk-3-0 libnspr4 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 zlib1g

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: 6000.3.11f1
          targetPlatform: ${{ matrix.targetPlatform }}
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Log build result
        run: echo "Unity build for ${{ matrix.targetPlatform }} finished."

      - name: Set build status label on PR
        if: github.event_name == 'pull_request' && always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" == "failure" ]; then
            echo "Build failed. Adding 'Do not merge' label..."
            gh pr edit $PR_NUMBER --add-label "Do not merge"
          elif [ "$JOB_STATUS" == "success" ]; then
            echo "Build succeeded. Removing 'Do not merge' label..."
            gh pr edit $PR_NUMBER --remove-label "Do not merge" || true
          else
            echo "Build status is '$JOB_STATUS'. No label changes."
          fi
