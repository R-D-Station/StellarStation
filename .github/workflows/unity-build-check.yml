name: Unity Build (Buildalon)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: buildalon/unity-setup@v2
        with:
          build-targets: 'StandaloneLinux64'

      - uses: buildalon/activate-unity-license@v2
        with:
          license: 'Personal'
          username: '${{ secrets.UNITY_USERNAME }}'
          password: '${{ secrets.UNITY_PASSWORD }}'

      - name: Install Buildalon Package
        run: |
          npm install -g openupm-cli
          openupm add com.virtualmaker.buildalon

      - uses: buildalon/unity-action@v3
        name: '${{ matrix.build-target }}-Build'
        with:
          build-target: '${{ matrix.build-target }}'
          args: '-quit -batchmode -nographics -buildTarget ${{ matrix.build-target }} -executeMethod UnityEditor.BuildPipeline.BuildPlayer'
